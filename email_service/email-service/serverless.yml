service: email-service

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.10
  region: us-east-1

plugins:
  - serverless-offline

functions:
  sendEmail:
    handler: handler.sendEmail
    events:
      - httpApi:
          path: /send-email
          method: post

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    useChildProcesses: true